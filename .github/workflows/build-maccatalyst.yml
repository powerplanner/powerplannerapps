name: Build Mac Catalyst

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-maccatalyst.yml'
      - 'ApplySecrets.ps1'
      - 'secrets.template.json'
      - 'PowerPlanneriOS/**'
      - 'PowerPlannerAppDataLibrary/**'
      - 'portablelibraries/**'
      - 'shared/**'
      - 'Vx/**'
      - 'Vx.iOS/**'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'main'
      whats_new:
        description: 'Release notes (Whats New) for the Mac App Store submission'
        required: false
        default: 'Bug fixes and improvements'

# Version format: YYMM.D.run_number (e.g. 2506.15.42)

jobs:
  set-version:
    runs-on: macos-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'build-no-approval' || 'build-approval' }}
    outputs:
      build_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Compute version
        id: version
        shell: bash
        run: |
          yymm=$(date -u +"%y%m")
          day=$(date -u +"%-d")
          version="$yymm.$day.${{ github.run_number }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Build version: $version"

  build:
    needs: set-version
    runs-on: macos-latest
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.ref }}
          submodules: recursive

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.202'

      - name: Install Mac Catalyst workload
        run: dotnet workload install ios android maccatalyst --version 10.0.202

      - name: Write secrets.json
        shell: bash
        run: |
          echo '${{ secrets.SECRETS_JSON }}' > secrets.json

      - name: Apply secrets
        shell: pwsh
        run: ./ApplySecrets.ps1

      - name: Install Apple Distribution certificate
        # Used to sign the .app bundle
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install Mac Installer certificate
        # Used to sign the .pkg installer — requires a separate "3rd Party Mac Developer Installer" certificate.
        # Export it from Xcode/Keychain as a .p12 and store it as MAC_INSTALLER_CERTIFICATE_P12_BASE64 / MAC_INSTALLER_CERTIFICATE_PASSWORD.
        env:
          P12_BASE64: ${{ secrets.MAC_INSTALLER_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/installer-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: List signing identities
        shell: bash
        run: security find-identity -v -p codesigning

      - name: Install Mac App Store provisioning profile
        # Requires a Mac Catalyst distribution provisioning profile (file extension: .provisionprofile).
        # Create it at developer.apple.com for the Mac Catalyst platform and store it as MAC_PROVISIONING_PROFILE_BASE64.
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}
        shell: bash
        run: |
          PP_PATH="$RUNNER_TEMP/mac.provisionprofile"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.provisionprofile"
          echo "Installed provisioning profile: $UUID"

      - name: Install Mac Widget provisioning profile
        # Requires a Mac Catalyst distribution provisioning profile for com.barebonesdev.powerplanner.widget.
        # Create it at developer.apple.com for the Mac Catalyst platform and store it as MAC_WIDGET_PROVISIONING_PROFILE_BASE64.
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        shell: bash
        run: |
          PP_PATH="$RUNNER_TEMP/mac-widget.provisionprofile"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.provisionprofile"
          echo "Installed widget provisioning profile: $UUID"

      - name: Set widget provisioning profile in NativeApp.xcodeproj
        shell: bash
        run: |
          sed -i '' 's|PRODUCT_BUNDLE_IDENTIFIER = com\.barebonesdev\.powerplanner\.widget;|PRODUCT_BUNDLE_IDENTIFIER = com.barebonesdev.powerplanner.widget; PROVISIONING_PROFILE_SPECIFIER = "${{ vars.MAC_WIDGET_PROVISIONING_PROFILE_NAME }}";|g' PowerPlanneriOSWidget/NativeApp.xcodeproj/project.pbxproj

      - name: Set NativeApp provisioning profile in NativeApp.xcodeproj
        shell: bash
        run: |
          sed -i '' 's|PRODUCT_BUNDLE_IDENTIFIER = com\.barebonesdev\.powerplanner;|PRODUCT_BUNDLE_IDENTIFIER = com.barebonesdev.powerplanner; PROVISIONING_PROFILE_SPECIFIER = "${{ vars.MAC_APP_PROVISIONING_PROFILE_NAME }}";|g' PowerPlanneriOSWidget/NativeApp.xcodeproj/project.pbxproj

      - name: Set version in Info-Mac.plist
        shell: bash
        run: |
          VERSION="${{ env.BUILD_VERSION }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" PowerPlanneriOS/Info-Mac.plist
          # macOS requires at most 3 version components; iOS uses $VERSION.0 but Mac cannot
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" PowerPlanneriOS/Info-Mac.plist

      - name: Restore PowerPlanneriOS
        run: dotnet restore PowerPlanneriOS/PowerPlanneriOS.csproj

      - name: Build XliffCompiler (dotnet build PowerPlanner)
        run: dotnet build PowerPlannerAppDataLibrary/PowerPlanner.csproj -c Release

      - name: Publish PowerPlanneriOS (Mac Catalyst)
        # Omitting -r lets dotnet build a universal binary (arm64 + x64) automatically.
        run: >-
          dotnet publish PowerPlanneriOS/PowerPlanneriOS.csproj
          -f net10.0-maccatalyst
          -c Release
          --self-contained
          -p:CreatePackage=true
          -p:CodesignProvision="${{ vars.MAC_APP_PROVISIONING_PROFILE_NAME }}"
          -p:CodesignKey="Apple Distribution: BareBones Dev%2c LLC (A9B367L69G)"
          -p:PackageSigningKey="3rd Party Mac Developer Installer: BareBones Dev, LLC (A9B367L69G)"
          ${{ vars.ADDITIONAL_BUILD_ARGUMENTS }}

      - name: Find and copy PKG
        id: find-pkg
        shell: bash
        run: |
          pkg=$(find . -name "*.pkg" -not -path "*/obj/*" -type f | head -1)
          if [ -z "$pkg" ]; then
            echo "No PKG found"
            exit 1
          fi
          mkdir -p artifacts
          cp "$pkg" "artifacts/PowerPlannerMac.${{ env.BUILD_VERSION }}.0.pkg"
          echo "PKG: artifacts/PowerPlannerMac.${{ env.BUILD_VERSION }}.0.pkg"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerPlannerMac.${{ env.BUILD_VERSION }}.0.pkg
          path: artifacts/*.pkg

      - name: Clean up keychain
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  upload-testflight:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download PKG artifact
        uses: actions/download-artifact@v4
        with:
          pattern: PowerPlannerMac.*.pkg
          path: artifacts

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        shell: bash
        run: |
          mkdir -p ~/private_keys
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          PKG_PATH=$(find artifacts -name "*.pkg" -type f | head -1)
          if [ -z "$PKG_PATH" ]; then
            echo "::error::No PKG file found in artifacts"
            exit 1
          fi
          echo "Uploading $PKG_PATH to TestFlight..."

          xcrun altool --upload-app \
            -f "$PKG_PATH" \
            -t macos \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --show-progress

  promote-to-production:
    needs:
      - upload-testflight
      - set-version
    runs-on: macos-latest
    environment: production
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
    steps:
      - name: Install Fastlane
        run: |
          gem install fastlane --no-document

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Create Fastlane API key JSON
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, os
          key_path = os.path.expanduser("~/private_keys/AuthKey_" + os.environ["APP_STORE_CONNECT_API_KEY_ID"] + ".p8")
          data = {
              "key_id": os.environ["APP_STORE_CONNECT_API_KEY_ID"],
              "issuer_id": os.environ["APP_STORE_CONNECT_API_ISSUER_ID"],
              "key": open(key_path).read(),
              "in_house": False
          }
          with open("api_key.json", "w") as f:
              json.dump(data, f)
          PYEOF

      - name: Create deliver configuration
        run: |
          mkdir -p fastlane
          echo 'app_identifier "com.barebonesdev.powerplanner"' > fastlane/Deliverfile

      - name: Create release notes
        shell: bash
        env:
          WHATS_NEW: ${{ github.event.inputs.whats_new || 'Bug fixes and improvements' }}
        run: |
          mkdir -p fastlane/metadata/en-US
          printf '%s\n' "$WHATS_NEW" > fastlane/metadata/en-US/release_notes.txt

      - name: Publish to Mac App Store
        env:
          BUILD_NUMBER: ${{ env.BUILD_VERSION }}.0
          APP_VERSION: ${{ env.BUILD_VERSION }}
        run: |
          fastlane deliver \
            --api_key_path api_key.json \
            --app_identifier "com.barebonesdev.powerplanner" \
            --app_version "$APP_VERSION" \
            --build_number "$BUILD_NUMBER" \
            --skip_screenshots \
            --automatic_release "true" \
            --precheck_include_in_app_purchases false \
            --platform mac \
            --force
